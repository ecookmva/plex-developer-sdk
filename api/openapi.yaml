          description: Purchase Order Line Item ID.
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        status:
          description: "The status of the new release. If no value is provided for\
            \ the status, it will be determined based on the firm and planned days\
            \ by the values provided in this request or in the Approved Supplier record\
            \ associated with the PO line item."
          example: string
          type: string
        dueDate:
          description: The Due Date of the Release.
          example: 2026-04-29T19:09:12Z
          format: date-time
          type: string
