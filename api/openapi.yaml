    custom_objects_api_Delete_Custom_Object_Data_In_Bulk_response:
      example:
        id: 00000000-0000-0000-0000-000000000000
        recordIdentifier: 5
        createdDateTime: 2026-04-29T19:08:45Z
        modifiedDateTime: 2026-04-29T19:08:45Z
        customFields:
          MyBooleanField: true
          MyCustomObjectRef:
            recordIdentifier: 4
            id: e9f1614e-1899-474b-93f2-ab6de5f52a7b
            displayValue: Blue
          MyDateField: 2023-10-29
          MyDateTimeField: 2023-10-24T15:50:00Z
          MyDecimalField: 50.75
          MyIntegerField: 20
          MyPartStandardObjectRef:
            recordIdentifiers:
              Part_Key: 1234
            displayValue: 4799-AAA
          MyTextField: Twenty Two
      properties:
        id:
          description: The uuid used to uniquely identify a custom object record.
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        recordIdentifier:
          description: The value used to uniquely identify a custom object record.
          example: 5
          format: int64
          type: integer
        createdDateTime:
          description: The timestamp from when the record was created.
          example: 2026-04-29T19:08:45Z
          format: date-time
          type: string
        modifiedDateTime:
          description: The timestamp from the last time the record was modified.
          example: 2026-04-29T19:08:45Z
          format: date-time
          type: string
        customFields:
          description: |-
            The custom fields and values for a custom object.
            The customFields property is an object with a schema derived from the relevant custom fields. Each property is the name of a custom field (not case sensitive) with a corresponding value matching the custom field's type.
            Custom Field Type to JSON Type Mapping

            Boolean - boolean
            Custom Object Reference -  object
            Date - string(date)
            Date Time - string(date-time)
            Decimal - number(double)
            Integer - integer(int64)
            Standard Object Reference - object
            Text - string
            Time - string(time)

            Custom Object Reference Format
            Custom Object References are always returned to the client as an object with three properties OR null.
            Properties

            id - string(uuid) - The uuid used to uniquely identify a custom object record.
            recordIdentifier - integer(int64) - The value used to uniquely identify a custom object record.
            displayValue - string - This is either the object's Primary Field (when specified) or the object's first field.

            When adding or updating a custom object reference, several formats can be used.

            A string(uuid) representing the record's ID.

            Example
            {
              &quot;customFields&quot;: {
                &quot;MyCustomObjectReference&quot;: &quot;d13023f2-9841-4439-8f8b-2d75ef3e87f4&quot;
              }
            }


            A integer(int64) representing a record identifier.

            Example
            {
              &quot;customFields&quot;: {
                &quot;MyCustomObjectReference&quot;: 15
              }
            }


            An object with either a recordIdentifier or id property. Additional properties (such as displayName) are ignored with write operations.

            Example
            {
              &quot;customFields&quot;: {
                &quot;MyCustomObjectReference&quot;: {
                  &quot;recordIdentifier&quot;: 15,
                  &quot;id&quot;: &quot;d13023f2-9841-4439-8f8b-2d75ef3e87f4&quot;,
                  &quot;displayValue&quot;: &quot;Blue&quot;
                }
              }
            }

            Standard Object Reference Format
            Standard Object References are always returned to the client as an object with two properties OR null.
            Properties

            recordIdentifiers - object - An object of identity keys and their values that uniquely identify a standard object record.  This object has a schema that is derived from the identifiers used by the referenced standard object. For example, the Part standard object has a single identifier named Part_Key.
            displayValue -  string - The human readable text used to represent the referenced record. This value alone may not uniquely identify a record.

            When adding or updating a standard object reference, several formats can be used.

            An object with the proper recordIdentifiers object. Additional properties (such as displayName) are ignored with write operations.

            Example
            {
              &quot;customFields&quot;: {
                &quot;MyPartReference&quot;: {
                  &quot;recordIdentifiers&quot;: {
                    &quot;Part_Key&quot;: 1234
                  },
                  &quot;displayValue&quot;: &quot;4799-AAA&quot;
                }
              }
            }


            When the referenced object only has one identifier, the single value may be used.

            Example
            {
              &quot;customFields&quot;: {
                &quot;MyPartReference&quot;: 1234
              }
            }
          example:
            MyBooleanField: true
            MyCustomObjectRef:
              recordIdentifier: 4
              id: e9f1614e-1899-474b-93f2-ab6de5f52a7b
              displayValue: Blue
            MyDateField: 2023-10-29
            MyDateTimeField: 2023-10-24T15:50:00Z
            MyDecimalField: 50.75
            MyIntegerField: 20
            MyPartStandardObjectRef:
              recordIdentifiers:
                Part_Key: 1234
              displayValue: 4799-AAA
            MyTextField: Twenty Two
          title: customFields
          type: object
      title: custom_objects_api_Delete_Custom_Object_Data_In_Bulk_response
      type: object
