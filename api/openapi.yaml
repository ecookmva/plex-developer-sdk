           {
             &quot;fieldName&quot;: &quot;MyDecimalField&quot;,
             &quot;operation&quot;: &quot;&gt;&quot;,
             &quot;operand&quot;: 10
           },
           {
             &quot;fieldName&quot;: &quot;MyTextField&quot;,
             &quot;operation&quot;: &quot;startsWith&quot;,
             &quot;operand&quot;: &quot;Field Val&quot;
           }
         ]
        }

