    production_operations_management_api_List_Workcenters_item:
      description: "A workcenter in Plex is defined as an area where a complete operation\
        \ happens. It may represent a single part operation or multiple part operations,\
        \ a single piece of equipment, or multiple pieces of equipment. A workcenter\
        \ could be a machine, such as a stamping press, or an area like an inspection\
        \ or assembly area, or a combination of these. When determining what your\
        \ workcenters will be, think of a workcenter as a place where a container\
        \ of parts is advanced through a routing step."
      example:
        workcenterId: 00000000-0000-0000-0000-000000000000
        workcenterCode: string
        name: string
        workcenterType: string
        workcenterGroup: string
        buildingId: 00000000-0000-0000-0000-000000000000
        buildingCode: string
        tankSilo: false
        productionLineId: 00000000-0000-0000-0000-000000000000
        ipAddress: string
        plcName: string
      properties:
        workcenterId:
          description: The UUID assigned to the workcenter.
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        workcenterCode:
          description: "50 characters max. A short name associated to the workcenterID,\
            \ and a unique code to reference the workcenter. This code shows up throughout\
            \ the system, primarily on the Control Panel."
          example: string
          type: string
        name:
          description: "100 characters max. The full name associated to the workcenterID\
            \ that is a more descriptive name for the Workcenter. Depending on your\
            \ settings, this name can also display on the control panel and sequence\
            \ board."
          example: string
          type: string
        workcenterType:
          description: "50 characters max. Setup table &quot;Workcenter Type&quot;\
            \ (part.dbo.workcenter_type). Grouping of similar workcenters. The Workcenter\
            \ Type influences how the workcenter behaves, but is also available as\
            \ a filter in different places (control panel, production status, Workcenter\
            \ log, sequence board)."
          example: string
          type: string
        workcenterGroup:
          description: "50 characters max. Setup table &quot;Workcenter Group&quot;\
            \ (part.dbo.workcenter_group). An optional grouping of similar workcenters.\
            \ This is helpful when there are many workcenters that can be chosen from\
            \ the Control Panel. If the Workcenter Group setting is on, the Control\
            \ Panel will display the Workcenter Groups then once a group is chosen,\
            \ the list of workcenters only in that group will display."
          example: string
          type: string
        buildingId:
          description: UUID of the building the workcenter is located in.
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        buildingCode:
          description: 50 characters max. A short name for the building.
          example: string
          type: string
        tankSilo:
          description: Boolean flag to indicate whether the workcenter is a Tank/Silo.
          example: false
