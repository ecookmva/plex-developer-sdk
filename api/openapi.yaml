  /quality/v1/checksheets:
    post:
      description: "Checksheets are the realization of control plan lines and are\
        \ used to collect real-time inspection data. Control plans may be classified\
        \ as either part or process. Part control plans are available at quality/{version}/control-plans,\
        \ while process control recipes are available at quality/{version}/process-control-plans.\
        \ Specifications are similarly divided into part and process, and can be found\
        \ at quality/{version}/specifications and quality/{version}/process-specifications,\
        \ respectively.\nThere are two primary types of checksheets: live and non-live.\n\
        A live checksheet is completed by an inspector directly within the Plex control\
        \ panel.\nA non-live checksheet is filled out outside the control panel, such\
        \ as through Checksheet launchers in Plex.\nThe following guidelines outline\
        \ the required information to create a checksheet:\n\nControlPlanId: Required\
        \ for a non-live checksheet. If there are multiple process control recipes\
        \ with the same PartId, OperationId, and InspectionMode, you must specify\
        \ this.\nProductionWorkcenterId: Required for completing a live checksheet.\
        \ The workcenter must be properly configured and have an operator logged in\
        \ to Plex. The control plan must be designated as primary and must have an\
        \ active control plan status (&quot;Available For Use&quot; flag set to true).\
        \ Additionally, for part control plans, the Inspection Mode Manufacturing\
        \ flag must be set to true, and the selected part operation must be active\
        \ and not designated as a sub-operation. For process control recipes, the\
        \ Inspection Mode Process Check flag must be set to true, the control plan\
        \ type must have its process flag enabled, and it must belong to a process\
        \ control recipe family.\nApprovedWorkcenterId: Relevant only for a non-live\
        \ checksheet. For a part and operation, these are available in production/{version}/production-definitions/approved-workcenters\n\
        InspectorEmployeeId: Do not specify this if you are providing the ProductionWorkcenterId.\
        \ For a live checksheet, this field is automatically set to the primary operator\
        \ logged into the workcenter. If no operator is specified, the inspector defaults\
        \ to the Plex API user. Employee information is available at mdm/{version}/employees.\n\
        JobOperationId: In live mode, if sent, should match the setup of the control\
        \ panel. They can be found at scheduling/{version}/jobs.\nPartOperationId:\
        \ In live mode, if sent, should match the setup of the control panel. They\
        \ can be found at mdm/{version}/part-operations.\nIf ProductionWorkcenterId\
        \ is specified, it is optional to send the PartId, PartOperationId, JobOperationId,\
        \ and ControlPlanId.\nIf JobOperationId is specified, it is optional to send\
        \ the PartId and PartOperationId.\nProcess control recipe validations differ\
        \ slightly from those of part control plans. For part control plans, you can\
        \ add the checksheet to either a live or non-live checksheet. For process\
        \ control recipes, the configuration of the process control recipe family,\
        \ along with the &quot;Control Panel&quot; group and the &quot;All Process\
        \ Checksheets Display&quot; setting, determines whether the submitted checksheet\
        \ is valid. If the recipe family is configured as workcenter-only, the checksheet\
        \ may be added only in the live-mode to any part associated with the specified\
        \ ProductionWorkcenterId, provided the operation matches that of the recipe\
        \ family. If the recipe family is set up with both parts and workcenters,\
        \ the checksheet can only be added to those specific combinations of parts,\
        \ workcenters, and operations defined in the recipe family. If the &quot;All\
        \ Process Checksheets Display&quot; setting is enabled, the restrictions for\
        \ workcenter-only or part-specific assignments no longer apply. In this case,\
        \ as long as the ProductionWorkcenterId and Operation are aligned, the checksheet\
        \ may be added to any part only in the live-mode.\n\nSample Request for a\
        \ Live Checksheet\n{\n  &quot;productionWorkcenterId&quot;: &quot;AF05A9CC-83D6-4A95-A79D-0932906A7212&quot;,\n\
        \  &quot;operationId&quot;: &quot;9C10C43A-4181-40CF-BE62-4B5ED0034F0D&quot;,\n\
        \  &quot;inspectionMode&quot;: &quot;In Process (each container)&quot;,\n\
        \  &quot;measurements&quot;: [\n    {\n      &quot;specificationId&quot;:\
        \ &quot;168E2C69-31AB-43B2-9B61-BC6A22BA0719&quot;,\n      &quot;value&quot;:\
        \ 1\n    }\n  ]\n}\n            \n\nSample Request for a Non-Live Checksheet\n\
        {\n  &quot;controlPlanId&quot;: &quot;616f5aad-0d68-48be-af5a-39da2f932f9d&quot;,\n\
        \  &quot;approvedWorkcenterId&quot;: &quot;57DFB705-7122-431D-B5B7-246DF6130BE7&quot;,\n\
        \  &quot;partId&quot;: &quot;85989389-5CE1-4FDD-95D9-94A3CD663CE6&quot;,\n\
        \  &quot;operationId&quot;: &quot;3C85A9B0-3B87-4FF5-95A6-1709D45986CE&quot;,\n\
        \  &quot;partOperationId&quot;: &quot;a0a315d1-ef64-4e74-9d56-02b430ea5e1f&quot;,\n\
        \  &quot;inspectionMode&quot;: &quot;Process Checks - Setup&quot;,\n  &quot;measurements&quot;:\
        \ [\n    {\n      &quot;specificationId&quot;: &quot;497ABAB9-D86D-4674-99F6-9586ED8D1578&quot;,\n\
        \      &quot;value&quot;: 510\n    }\n  ]\n}\n\n\nUnsupported Functionality:\n\
        \nStreams\nPiece Measurements\n\nThis operation supports sending in a maximum\
        \ of 100 specifications for a checksheet."
      operationId: checksheet_api_Create_Checksheet
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/checksheet_api_Create_Checksheet_request"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/checksheet_api_Create_Checksheet_201_response"
          description: Checksheet added successfully.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/checksheet_api_Create_Checksheet_400_response"
          description: A validation error occurred.
      summary: Create Checksheet
      tags:
      - Checksheet API
