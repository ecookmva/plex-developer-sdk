    inventory_operations_management_api_List_Container_Adjustments_item:
      description: "In Plex, container adjustments are inventory changes made outside\
        \ of standard receiving, shipping, and production activities, such as cycle\
        \ counts or manual updates to the container quantity itself."
      example:
        adjustmentDate: 2026-04-29T19:08:56Z
        serialNo: string
        quantity: 0.1
        netWeight: 0.1
        adjustmentCode: string
        partId: 00000000-0000-0000-0000-000000000000
        partNumber: string
        revision: string
        partNumberRevision: string
        partOperationId: 00000000-0000-0000-0000-000000000000
        operationCode: string
        operationNumber: 0
        location: string
        locationId: 00000000-0000-0000-0000-000000000000
      properties:
        adjustmentDate:
          description: The date and time when an inventory adjustment was made.
          example: 2026-04-29T19:08:56Z
          format: date-time
          type: string
        serialNo:
          description: 25 characters max. The serial number of the container that
            was adjusted.
          example: string
          type: string
        quantity:
          description: "Decimal, (19,5) max characters. The delta quantity that was\
            \ adjusted. This value could be a positive number (inventory quantity\
            \ increased) or a negative number (inventory quantity decreased)."
          example: 0.1
          format: double
          type: number
        netWeight:
          description: "Decimal, (19,5) max characters. The delta net weight that\
            \ was adjusted. This value could be a positive number (weight increased)\
            \ or a negative number (weight decreased)."
          example: 0.1
          format: double
          type: number
        adjustmentCode:
          description: 50 characters max. Setup table &quot;Adjustment Reason&quot;
            (part.dbo.adjustment_reason). The Adjustment Reason setup table lists
            the acceptable reasons for inventory changes.
          example: string
          type: string
        partId:
          description: The container's Part ID.
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        partNumber:
          description: "100 characters max. The container's Part Number. A short code\
            \ or number to call the part. This value shows up throughout the system,\
            \ so use something others will recognize. Acceptable Part Number characters\
            \ include uppercase and lowercase letters (A-Z), numbers (0-9), and special\
            \ characters such as dashes (-), underscores ( _ ), and spaces. Other\
            \ characters may cause issues."
          example: string
          type: string
        revision:
          description: 8 characters max. The container's Part Revision. A revision
            level represents a change or modification to a part or part drawing that
            is usually initiated through an engineering change request (ECR).
          example: string
          type: string
        partNumberRevision:
          description: "Format {partNumber}{part rev separator}{revision}. The container's\
            \ Part Number Revision formatted with separator. If a part number has\
            \ a revision, Plex will return the part number and the revision separated\
            \ by the Part Rev Separator setting. A Part Rev Separator can be up to\
            \ 5 characters long."
          example: string
          type: string
        partOperationId:
          description: The container's Part Operation ID.
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        operationCode:
          description: 10 characters max. The container's Operation Code.
          example: string
          type: string
        operationNumber:
          description: 30 characters max. The container's Operation Number (sequence
            order).
          example: 0
          format: int32
          type: integer
        location:
          description: 50 characters max. The Location Code of the container that
            was adjusted.
          example: string
          type: string
        locationId:
          description: The location ID of the container that was adjusted.
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
      title: inventory_operations_management_api_List_Container_Adjustments_item
      type: object
