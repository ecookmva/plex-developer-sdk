    production_operations_management_api_Get_Workcenter_response:
      description: "A workcenter in Plex is defined as an area where a complete operation\
        \ happens. It may represent a single part operation or multiple part operations,\
        \ a single piece of equipment, or multiple pieces of equipment. A workcenter\
        \ could be a machine, such as a stamping press, or an area like an inspection\
        \ or assembly area, or a combination of these. When determining what your\
        \ workcenters will be, think of a workcenter as a place where a container\
        \ of parts is advanced through a routing step."
      example:
        workcenterId: 00000000-0000-0000-0000-000000000000
        workcenterCode: string
        name: string
        workcenterType: string
        workcenterGroup: string
        buildingId: 00000000-0000-0000-0000-000000000000
        buildingCode: string
        tankSilo: false
        productionLineId: 00000000-0000-0000-0000-000000000000
        ipAddress: string
        plcName: string
      properties:
        workcenterId:
          description: The UUID assigned to the workcenter.
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        workcenterCode:
          description: "50 characters max. A short name associated to the workcenterID,\
            \ and a unique code to reference the workcenter. This code shows up throughout\
            \ the system, primarily on the Control Panel."
          example: string
          type: string
        name:
          description: "100 characters max. The full name associated to the workcenterID\
            \ that is a more descriptive name for the Workcenter. Depending on your\
            \ settings, this name can also display on the control panel and sequence\
            \ board."
          example: string
          type: string
        workcenterType:
          description: "50 characters max. Setup table &quot;Workcenter Type&quot;\
            \ (part.dbo.workcenter_type). Grouping of similar workcenters. The Workcenter\
            \ Type influences how the workcenter behaves, but is also available as\
            \ a filter in different places (control panel, production status, Workcenter\
            \ log, sequence board)."
          example: string
          type: string
        workcenterGroup:
          description: "50 characters max. Setup table &quot;Workcenter Group&quot;\
            \ (part.dbo.workcenter_group). An optional grouping of similar workcenters.\
            \ This is helpful when there are many workcenters that can be chosen from\
            \ the Control Panel. If the Workcenter Group setting is on, the Control\
            \ Panel will display the Workcenter Groups then once a group is chosen,\
            \ the list of workcenters only in that group will display."
          example: string
          type: string
        buildingId:
          description: UUID of the building the workcenter is located in.
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        buildingCode:
          description: 50 characters max. A short name for the building.
          example: string
          type: string
        tankSilo:
          description: Boolean flag to indicate whether the workcenter is a Tank/Silo.
          example: false
          type: boolean
        productionLineId:
          description: The unique identifier for the production line associated with
            the workcenter.
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        ipAddress:
          description: The IP Address of the workcenter.
          example: string
          type: string
        plcName:
          description: The PLC Name of the workcenter.
          example: string
          type: string
      title: production_operations_management_api_Get_Workcenter_response
      type: object
    production_operations_management_api_List_Production_Entries_Summary_item:
      description: "A production record in Plex is the action of recording production\
        \ of a product that results in depleting source material and advancing the\
        \ product to the next operation. A single production record is created each\
        \ time production is recorded. When Plex Production Tracking is implemented,\
        \ production is recorded multiple times during a shift. For example, after\
        \ a container is full or a job operation is completed, there may be a long\
        \ list of production records. Production records do not include scrapped parts\
        \ (scrapped using specific scrapping functions). Production records include\
        \ parts produced and moved into a Plex container record, regardless of the\
        \ status of that container record."
      example:
        workcenterId: 00000000-0000-0000-0000-000000000000
        workcenterCode: string
        totalQuantity: 0.1
        jobId: 00000000-0000-0000-0000-000000000000
        jobNumber: string
        partId: 00000000-0000-0000-0000-000000000000
        partNumber: string
        revision: string
        partNumberRevision: string
        partOperationId: 00000000-0000-0000-0000-000000000000
        operationNumber: 0
        operationCode: string
      properties:
        workcenterId:
          description: UUID V4 format XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX. UUID of
            the workcenter where the production transaction was recorded.
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        workcenterCode:
          description: "50 characters max.  A short name associated to the workcenterID,\
            \ and a unique code to reference the workcenter. This code shows up throughout\
            \ the system, primarily on the Control Panel."
          example: string
          type: string
        totalQuantity:
          description: "Decimal, (18,3) max characters. Total Quantity that was produced."
          example: 0.1
          format: double
          type: number
        jobId:
          description: UUID V4 format XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX. UUID of
            the production job that production was recorded against. Note that a production
            job is not necessary to record production. Another scheduling method such
            as kanban may have been used.
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        jobNumber:
          description: "20 characters max.  Job number, including prefix and suffix,\
            \ associated to the jobID that production was recorded against."
          example: string
          type: string
        partId:
          description: UUID V4 format XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX. UUID of
            the part that was produced.
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        partNumber:
          description: "100 characters max. Part Number associated to the partId that\
            \ was produced. A short code or number to call the part. This value shows\
            \ up throughout the system, so use something others will recognize. Acceptable\
            \ Part Number characters include uppercase and lowercase letters (A-Z),\
            \ numbers (0-9), and special characters such as dashes (-), underscores\
            \ ( _ ), and spaces. Other characters may cause issues."
          example: string
          type: string
        revision:
          description: 8 characters max. Part Revision of the partID. A revision level
            represents a change or modification to a part or part drawing that is
            usually initiated through an engineering change request (ECR).
          example: string
          type: string
        partNumberRevision:
          description: "Format {partNumber}{part rev separator}{revision}. Part Number\
            \ and Revision formatted with separator. If a part number has a revision,\
            \ Plex will return the part number and the revision separated by the Part\
            \ Rev Separator setting. A Part Rev Separator can be up to 5 characters\
            \ long."
          example: string
          type: string
        partOperationId:
          description: UUID V4 format XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX. UUID of
            the part operation that was produced.
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        operationNumber:
          description: 10 characters max. The Operation Number (sequence order) of
            the part Operation that was produced.
          example: 0
          format: int32
          type: integer
        operationCode:
          description: 30 characters max. The Operation Code associated to the partoperationID.
          example: string
          type: string
      title: production_operations_management_api_List_Production_Entries_Summary_item
      type: object
