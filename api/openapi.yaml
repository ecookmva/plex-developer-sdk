    production_operations_management_api_List_Production_Entries_item:
      description: "A production record in Plex is the action of recording production\
        \ of a product that results in depleting source material and advancing the\
        \ product to the next operation. A single production record is created each\
        \ time production is recorded. When Plex Production Tracking is implemented,\
        \ production is recorded multiple times during a shift. For example, after\
        \ a container is full or a job operation is completed, there may be a long\
        \ list of production records. Production records do not include scrapped parts\
        \ (scrapped using specific scrapping functions). Production records include\
        \ parts produced and moved into a Plex container record, regardless of the\
        \ status of that container record."
      example:
        transactionDate: 2026-04-29T19:09:08Z
        workcenterId: 00000000-0000-0000-0000-000000000000
        workcenterCode: string
        serialNo: string
        lotNo: string
        employeeId: 00000000-0000-0000-0000-000000000000
        employeeName: string
        quantity: 0.1
        jobId: 00000000-0000-0000-0000-000000000000
        jobCode: string
        jobNo: string
        partId: 00000000-0000-0000-0000-000000000000
        partNumber: string
        revision: string
        partNumberRevision: string
        partOperationId: 00000000-0000-0000-0000-000000000000
        operationNumber: 0
        operationCode: string
        masterUnitNo: string
        masterUnitId: 00000000-0000-0000-0000-000000000000
        lotId: 00000000-0000-0000-0000-000000000000
        heatCode: string
        heatNo: string
        heatId: 00000000-0000-0000-0000-000000000000
        unit: string
        trackingNo: string
        shelfDateTime: 2026-04-29T19:09:08Z
        manufacturedDateTime: 2026-04-29T19:09:08Z
        bestByDateTime: 2026-04-29T19:09:08Z
        useByDateTime: 2026-04-29T19:09:08Z
        sellByDateTime: 2026-04-29T19:09:08Z
      properties:
        transactionDate:
          description: The date and time on which the production transaction was recorded
            in Plex.
          example: 2026-04-29T19:09:08Z
          format: date-time
          type: string
        workcenterId:
          description: The ID of the workcenter where the production transaction was
            recorded.
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        workcenterCode:
          description: "A short name associated to the &quot;workcenterID&quot; and\
            \ a unique code to reference the workcenter. This code shows up throughout\
            \ the system, primarily on the Control Panel. 50 characters max."
          example: string
          type: string
        serialNo:
          description: The serial number of the container. 25 characters max.
          example: string
          type: string
        lotNo:
          description: The unique lot number. 25 characters max.
          example: string
