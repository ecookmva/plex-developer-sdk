        productionLineId:
          description: The unique identifier for the production line associated with
            the workcenter.
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        ipAddress:
          description: The IP Address of the workcenter.
          example: string
          type: string
        plcName:
          description: The PLC Name of the workcenter.
          example: string
