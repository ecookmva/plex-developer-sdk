    production_operations_management_api_List_Labor_Entries_item:
      description: "In Plex, time spent by shop floor operators is tracked when they\
        \ clock into a workcenter's timeclock and select a Labor Cost Activity. When\
        \ an operator changes the activity, prior activity closes and the new activity\
        \ starts. Operators can manually close an open activity by clocking out, or\
        \ Plex can automatically force a clock out if an operator forgets to do so\
        \ manually at the end of a shift."
      example:
        employee: string
        employeeId: 00000000-0000-0000-0000-000000000000
        accountId: 00000000-0000-0000-0000-000000000000
        costActivity: string
        workcenterId: 00000000-0000-0000-0000-000000000000
        workcenterCode: string
        jobId: 00000000-0000-0000-0000-000000000000
        jobCode: string
        partId: 00000000-0000-0000-0000-000000000000
        partNumber: string
        revision: string
        partNumberRevision: string
        partOperationId: 00000000-0000-0000-0000-000000000000
        operationNumber: 0
        operationCode: string
        beginTime: 2026-04-29T19:09:07Z
        endTime: 2026-04-29T19:09:07Z
        duration: 0
      properties:
        employee:
          description: "Format {Last Name}, {First Name} ({Department}) Example &quot;Smith,\
            \ John (Quality)&quot;.&quot; The name of an employee associated to labor\
            \ record."
          example: string
          type: string
        employeeId:
          description: UUID V4 format XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX. UUID assigned
            to employee that is associated to labor record.
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        accountId:
          description: UUID V4 format XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX. UUID assigned
            to an IAM account that is associated to labor record.
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        costActivity:
          description: "50 characters max. The type of manufacturing labor activity\
            \ that was performed, such as Setup, Maintenance, Production. This is\
            \ the Cost Sub Type configured in Cost Types Setup application."
          example: string
          type: string
        workcenterId:
          description: UUID V4 format XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX. UUID of
            the workcenter where the labor transaction was recorded.
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        workcenterCode:
          description: 50 characters max. A short name associated to the workcenterID
            at which a labor transaction occurred.
          example: string
          type: string
        jobId:
          description: UUID V4 format XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX. UUID of
            the production job that was loaded to the workcenter when labor record
            was created.
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        jobCode:
          description: "20 characters max. Job number, including prefix and suffix,\
            \ associated to the jobID that was loaded to the workcenter when labor\
            \ record was created."
          example: string
          type: string
        partId:
          description: UUID V4 format XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX. UUID of
            the part that was being produced in the workcenter when the labor activity
            was recorded.
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        partNumber:
          description: "100 characters max. Part Number associated to the partId that\
            \ was being produced in the workcenter when the labor activity was recorded.\
            \ A short code or number to call the part. This value shows up throughout\
            \ the system, so use something others will recognize. Acceptable Part\
            \ Number characters include uppercase and lowercase letters (A-Z), numbers\
            \ (0-9), and special characters such as dashes (-), underscores ( _ ),\
            \ and spaces. Other characters may cause issues."
          example: string
          type: string
        revision:
          description: 8 characters max. Part Revision of the partID. A revision level
            represents a change or modification to a part or part drawing that is
            usually initiated through an engineering change request (ECR).
          example: string
          type: string
        partNumberRevision:
          description: "Format {partNumber}{part rev separator}{revision}. Part Number\
            \ and Revision formatted with separator. If a part number has a revision,\
            \ Plex will return the part number and the revision separated by the Part\
            \ Rev Separator setting. A Part Rev Separator can be up to 5 characters\
            \ long."
          example: string
          type: string
        partOperationId:
          description: UUID V4 format XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX. The UUID
            of the part operation that was being produced in the workcenter when the
            labor activity was recorded.
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        operationNumber:
          description: 10 characters max. The Operation Number (sequence order) of
            the part Operation that was being produced in the workcenter when the
            labor activity was recorded.
          example: 0
          format: int32
          type: integer
        operationCode:
          description: 30 characters max. The Operation Code associated to the partOperationID.
          example: string
          type: string
        beginTime:
          description: Date/Time Format YYYY-MM-DDThh:mm:ss.fffffffZ See Knowledge
            center topic &quot;Dates and Times&quot; for more information (KC path
            Platform &gt; Plex APIs &gt; HTTP Data Source API &gt; Dates and Times).
            The start date and time of the activity.
          example: 2026-04-29T19:09:07Z
          format: date-time
          type: string
        endTime:
          description: Date/Time Format YYYY-MM-DDThh:mm:ss.fffffffZ See Knowledge
            center topic &quot;Dates and Times&quot; for more information (KC path
            Platform &gt; Plex APIs &gt; HTTP Data Source API &gt; Dates and Times).
            The end date and time of the activity.
          example: 2026-04-29T19:09:07Z
          format: date-time
          type: string
        duration:
          description: The duration of the labor record in minutes.
          example: 0
          format: int32
          type: integer
      title: production_operations_management_api_List_Labor_Entries_item
      type: object
