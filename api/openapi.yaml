          &quot;fieldValueSearchFilters&quot;: [
           {
             fieldName&quot;: &quot;decimalTestLine&quot;,
             &quot;operation&quot;: &quot;&gt;&quot;,
             &quot;operand&quot;: 10
           },
           {
             &quot;fieldName&quot;: &quot;textUniqueLine&quot;,
             &quot;operation&quot;: &quot;startsWith&quot;,
             &quot;operand&quot;: &quot;text&quot;
           }
         ]
        }

        Sample request for search by identity values
        POST /search

        {
          &quot;standardObjectName&quot;: &quot;GLJournalDist&quot;,
          &quot;recordIdentifiers&quot;: [
             {
               &quot;Journal_Link&quot;: 8,
               &quot;Line_Item_No&quot;: 30113466
             },
             {
                &quot;Journal_Link&quot;: 8,
                &quot;Line_Item_No&quot;: 30113467
             }
          ]
        }

        This operation will return a maximum of 5000.
      operationId: custom_fields_api_Search_Field_Values
