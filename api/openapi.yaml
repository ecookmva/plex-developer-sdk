          description: A unique identifier representing the Inspector Employee.
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        measurements:
          description: A list of Measurements.
          example:
          - specificationId: 00000000-0000-0000-0000-000000000000
            value: 0.1
            values:
            - 0.1
            note: string
            gageId: string
          items:
            $ref: "#/components/schemas/measurements_item"
          title: measurements
          type: array
        spcChecksheetContainerText:
          description: SPC Checksheet Container Text.
          example: string
          type: string
        spcChecksheetHeatText:
          description: SPC Checksheet Heat Text.
          example: string
          type: string
        spcChecksheetProductionText:
          description: SPC Checksheet Production Text.
          example: string
          type: string
        specificationId:
          description: A unique identifier representing the Specification.
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        value:
          description: "The Measurement Value.\n  Attribute specifications are qualitative\
            \ part features that can only result in a count of non-conformances, \n\
            \  like the presence of a burrs on a part, leak or no leak etc.\n  You\
            \ may collect attribute data against a variable spec by specifying the\
            \ pass / fail condition on the control plan line form, \n  so if a specification\
            \ can be measured on a continuous scale, then enter it as a variable spec.\n\
            \  Measurements for attribute type must specify either a 1 or a 0 signifying\
            \ a pass or a fail scenario. \n\n\n  Variable specifications are something\
            \ that is not an attribute specification. \n  It can be measured on a\
            \ continuous scale, such as height, weight, diameter, temperature, etc.\n\
            \  These would be tolerance types such as:\n  Two Sided (10 mm +/- 0.05\
            \ mm)\n  One Sided Maximum (10 mm max)\n  Based on which tolerance type\
            \ you select, the limits will be calculated. For example, for a Two Sided\
            \ Tolerance, \n  fields for the target and +/- values will be needed.\n\
            \n\n  A specification could have one or more bonus tolerances associated\
            \ with it.\n  An example for when this is needed: You have a feature size\
            \ between 10mm to 11mm or 10.5mm +/- .5mm. \n  In addition there is an\
            \ allowable maximum material condition of .02 or bonus tolerance for straightness.\n\
            \  If the feature size was at it's maximum say 11mm, then the bonus tolerance\
            \ would be .02mm.\n  The way this will be need to be defined in part specification\
            \ would be as below :\n  - Create a Part Specification for the Feature\
            \ Size of 10.5mm +/- .5mm.\n  - Create another Part Specification for\
            \ the Bonus Tolerance. In this example we are using a Tolerance Type &quot;One-Sided\
            \ Maximum&quot; and added the .02mm.\n  - Specify a Bonus Tolerance and\
            \ add a Part Specification with the feature size of 10.5mm as the Dependent\
            \ Specification. \n  - Make the Applied To as &quot;Upper&quot; and the\
            \ Bonus Side as &quot;Upper&quot;.\n  Finally create a Control Plan using\
            \ these two Part Specifications. When you fillout a checksheet and add\
            \ a dimenstion for the feature size, \n  the bonus specification will\
            \ calculate in the target area automatically and you can enter a measurement\
            \ as long as it meets the allowed target.\n  Note: The setting &quot;Bonus\
            \ Tolerance When Out of Spec Apply&quot; will also contribute to the upper\
            \ and lower bonus tolerance.\n  When turned on, bonus tolerance values\
            \ will be calculated even when the bonus is based on a measurement that\
            \ is out-of-spec. \n  When off, no bonus is applied from out-of-spec measurements.\n\
            \n\n  Compare value specifications only apply to attribute Specifications.\
            \ \n  It works in conjunction with the Control Plan line if you turn on\
            \ the setting &quot;Custom Checksheet Data Collection Type Display&quot;.\
            \ \n  For specifying such compare value functions add the value on the\
            \ note section of measurements."
          example: 0.1
          format: double
          type: number
        values:
          description: The Measurement Values.
          example:
          - 0.1
          items:
            format: double
            title: values_item
            type: number
          title: values
          type: array
        gageId:
          description: "The Gage ID for the Measurement Group. Note this will be saved\
            \ on the checksheet only if the Setting Control_Plans , Gage ID Store\
            \ is set to true. This field will be required if the corresponding inspection\
            \ mode requires it."
          example: string
          type: string
      title: checksheet_api_Create_Checksheet_request
      type: object
