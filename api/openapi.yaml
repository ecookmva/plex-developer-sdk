    production_operations_management_api_List_Scrap_Entries_item:
      description: A Scrap Entry in Plex is the action of scrapping a specific quantity
        of component or produced part that results in removing that quantity out of
        inventory. Recording of scrap is performed using the dedicated Record Scrap
        functions in the Control Panel or in other standalone applications.
      example:
        transactionDate: 2026-04-29T19:09:08Z
        scrapReason: string
        transactionType: string
        quantity: 0.1
        workcenterId: 00000000-0000-0000-0000-000000000000
        workcenterCode: string
        jobId: 00000000-0000-0000-0000-000000000000
        jobCode: string
        partId: 00000000-0000-0000-0000-000000000000
        partNumber: string
        revision: string
        partNumberRevision: string
        partOperationId: 00000000-0000-0000-0000-000000000000
        operationNumber: 0
        operationCode: string
        serialNo: string
      properties:
        transactionDate:
          description: Date/Time Format YYYY-MM-DDThh:mm:ss.fffffffZ See Knowledge
            center topic &quot;Dates and Times&quot; for more information (KC path
            Platform &gt; Plex APIs &gt; HTTP Data Source API &gt; Dates and Times).
            The date and time on which the scrap transaction was recorded in Plex.
          example: 2026-04-29T19:09:08Z
          format: date-time
          type: string
        scrapReason:
          description: 50 characters max. Setup table &quot;Scrap Reason&quot; (part.dbo.scrap_reason).
            The reason code which indicates why the material or part was scrapped.
          example: string
          type: string
        transactionType:
          description: Possible values are &quot;Control Panel Scrap&quot; and &quot;Scrap&quot;.
            Scrapping a part being produced in Control Panel will be identified as
            Control Panel Scrap. Recording scrap using any other application will
            be identified as Scrap.
          example: string
          type: string
        quantity:
          description: "Decimal, (19,5) max characters. Quantity that was scrapped."
          example: 0.1
          format: double
          type: number
        workcenterId:
          description: UUID V4 format XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX. UUID of
            the workcenter where scrap was recorded.
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        workcenterCode:
          description: "50 characters max. A short name associated to the workcenterID,\
            \ and a unique code to reference the workcenter. This code shows up throughout\
            \ the system, primarily on the Control Panel."
          example: string
          type: string
        jobId:
          description: UUID V4 format XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX. UUID of
            the production job that scrap was recorded against. Note that a production
            job is not necessary to record scrap. Another scheduling method such as
            kanban may have been used.
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        jobCode:
          description: "20 characters max. Job number, including prefix and suffix,\
            \ associated to the jobID that scrap was recorded against."
          example: string
          type: string
        partId:
          description: UUID V4 format XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX. UUID of
            the part that was scrapped.
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        partNumber:
          description: "100 characters max. Part Number associated to the partId that\
            \ was scrapped. A short code or number to call the part. This value shows\
            \ up throughout the system, so use something others will recognize. Acceptable\
            \ Part Number characters include uppercase and lowercase letters (A-Z),\
            \ numbers (0-9), and special characters such as dashes (-), underscores\
            \ ( _ ), and spaces. Other characters may cause issues."
          example: string
          type: string
        revision:
          description: 8 characters max. Part Revision of the partID. A revision level
            represents a change or modification to a part or part drawing that is
            usually initiated through an engineering change request (ECR).
          example: string
          type: string
        partNumberRevision:
          description: "Format {partNumber}{part rev separator}{revision}. Part Number\
            \ and Revision formatted with separator. If a part number has a revision,\
            \ Plex will return the part number and the revision separated by the Part\
            \ Rev Separator setting. A Part Rev Separator can be up to 5 characters\
            \ long."
          example: string
          type: string
        partOperationId:
          description: UUID V4 format XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX. UUID of
            the part operation that was scrapped.
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        operationNumber:
          description: 10 characters max. The Operation Number (sequence order) of
            the part Operation that was scrapped.
          example: 0
          format: int32
          type: integer
        operationCode:
          description: 30 characters max. The Operation Code associated to the partOperationID.
          example: string
          type: string
        serialNo:
          description: 25 characters max. The Serial No of the Scrap/Rejection Container.
          example: string
          type: string
      title: production_operations_management_api_List_Scrap_Entries_item
      type: object
