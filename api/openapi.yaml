    measurements_item:
      description: The data structure representing a Measurement.
      properties:
        specificationId:
          description: A unique identifier representing the Specification.
          format: uuid
          type: string
        value:
          description: "The Measurement Value.\r\n \r\n      Attribute specifications\
            \ are qualitative part features that can only result in a count of non-conformances,\
            \ \r\n      like the presence of a burrs on a part, leak or no leak etc.\r\
            \n      You may collect attribute data against a variable spec by specifying\
            \ the pass / fail condition on the control plan line form, \r\n      so\
            \ if a specification can be measured on a continuous scale, then enter\
            \ it as a variable spec.\r\n      Measurements for attribute type must\
            \ specify either a 1 or a 0 signifying a pass or a fail scenario. \r\n\
            \    \r\n \r\n      Variable specifications are something that is not\
            \ an attribute specification. \r\n      It can be measured on a continuous\
            \ scale, such as height, weight, diameter, temperature, etc.\r\n     \
            \ These would be tolerance types such as:\r\n      Two Sided (10 mm +/-\
            \ 0.05 mm)\r\n      One Sided Maximum (10 mm max)\r\n      Based on which\
            \ tolerance type you select, the limits will be calculated. For example,\
            \ for a Two Sided Tolerance, \r\n      fields for the target and +/- values\
            \ will be needed.\r\n    \r\n\r\n      A specification could have one\
            \ or more bonus tolerances associated with it.\r\n      An example for\
            \ when this is needed: You have a feature size between 10mm to 11mm or\
            \ 10.5mm +/- .5mm. \r\n      In addition there is an allowable maximum\
            \ material condition of .02 or bonus tolerance for straightness.\r\n \
            \     If the feature size was at it's maximum say 11mm, then the bonus\
            \ tolerance would be .02mm.\r\n      The way this will be need to be defined\
            \ in part specification would be as below :\r\n      - Create a Part Specification\
            \ for the Feature Size of 10.5mm +/- .5mm.\r\n      - Create another Part\
            \ Specification for the Bonus Tolerance. In this example we are using\
            \ a Tolerance Type \"One-Sided Maximum\" and added the .02mm.\r\n    \
            \  - Specify a Bonus Tolerance and add a Part Specification with the feature\
            \ size of 10.5mm as the Dependent Specification. \r\n      - Make the\
            \ Applied To as \"Upper\" and the Bonus Side as \"Upper\".\r\n      Finally\
            \ create a Control Plan using these two Part Specifications. When you\
            \ fillout a checksheet and add a dimenstion for the feature size, \r\n\
            \      the bonus specification will calculate in the target area automatically\
            \ and you can enter a measurement as long as it meets the allowed target.\r\
            \n      Note: The setting \"Bonus Tolerance When Out of Spec Apply\" will\
            \ also contribute to the upper and lower bonus tolerance.\r\n      When\
            \ turned on, bonus tolerance values will be calculated even when the bonus\
            \ is based on a measurement that is out-of-spec. \r\n      When off, no\
            \ bonus is applied from out-of-spec measurements.\r\n    \r\n\r\n    \
            \  Compare value specifications only apply to attribute Specifications.\
            \ \r\n      It works in conjunction with the Control Plan line if you\
            \ turn on the setting \"Custom Checksheet Data Collection Type Display\"\
            . \r\n      For specifying such compare value functions add the value\
            \ on the note section of measurements."
          format: double
          type: number
        values:
          description: The Measurement Values.
          items:
            format: double
            title: values_item
            type: number
          title: values
          type: array
        note:
          description: The note on the Measurement Group.
          type: string
        gageId:
          description: "The Gage ID for the Measurement Group. Note this will be saved\
            \ on the checksheet only if the Setting Control_Plans , Gage ID Store\
            \ is set to true. This field will be required if the corresponding inspection\
            \ mode requires it."
          type: string
      title: measurements_item
      type: object
