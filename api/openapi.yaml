          description: The employee name using the Plex User Display Name format.
          example: string
          type: string
        quantity:
          description: The quantity that was produced.
          example: 0.1
          format: double
          type: number
        jobId:
          description: The ID of the production job that production was recorded against.
            Note that a production job is not necessary to record production. Another
            scheduling method such as Kanban may have been used.
          example: 00000000-0000-0000-0000-000000000000
