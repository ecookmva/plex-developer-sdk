    production_operations_management_api_List_Workcenter_Status_Entries_item:
      description: "In Plex, workcenter production hours are tracked throughout the\
        \ day when a workcenter's status is changed in Control Panel. Status can be\
        \ changed manually by user or automated by a machine when the machine is integrated\
        \ with Plex."
      example:
        workcenterId: 00000000-0000-0000-0000-000000000000
        workcenterCode: string
        logDate: 2026-04-29T19:09:09Z
        workcenterStatus: string
        jobId: 00000000-0000-0000-0000-000000000000
        jobCode: string
        partId: 00000000-0000-0000-0000-000000000000
        partNumber: string
        revision: string
        partNumberRevision: string
        partOperationId: 00000000-0000-0000-0000-000000000000
        operationNumber: 0
        operationCode: string
        duration: 0
      properties:
        workcenterId:
          description: UUID V4 format XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX. UUID of
            the workcenter where the status transaction was recorded.
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        workcenterCode:
          description: "50 characters max. A short name associated to the workcenterID,\
            \ and a unique code to reference the workcenter. This code shows up throughout\
            \ the system, primarily on the Control Panel."
          example: string
          type: string
        logDate:
          description: Date/Time Format YYYY-MM-DDThh:mm:ss.fffffffZ See Knowledge
            center topic &quot;Dates and Times&quot; for more information (KC path
            Platform &gt; Plex APIs &gt; HTTP Data Source API &gt; Dates and Times).
            The date and time when the workcenter status transaction started.
          example: 2026-04-29T19:09:09Z
          format: date-time
          type: string
        workcenterStatus:
          description: 50 characters max. The workcenter status associated to a recorded
            transaction.
          example: string
          type: string
        jobId:
          description: UUID V4 format XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX. UUID of
            the production job that was loaded to the workcenter.
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        jobCode:
          description: "20 characters max. Job number, including prefix and suffix,\
            \ associated to the jobID."
          example: string
          type: string
        partId:
          description: UUID V4 format XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX. UUID of
            the part that was being produced in the workcenter when the workcenter
            status transaction was recorded.
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        partNumber:
          description: "100 characters max. Part Number associated to the partId that\
            \ was being produced in the workcenter when the workcenter status transaction\
            \ was recorded. A short code or number to call the part. This value shows\
            \ up throughout the system, so use something others will recognize. Acceptable\
            \ Part Number characters include uppercase and lowercase letters (A-Z),\
            \ numbers (0-9), and special characters such as dashes (-), underscores\
            \ ( _ ), and spaces. Other characters may cause issues."
          example: string
          type: string
        revision:
          description: 8 characters max. Part Revision of the partID. A revision level
            represents a change or modification to a part or part drawing that is
            usually initiated through an engineering change request (ECR).
          example: string
          type: string
        partNumberRevision:
          description: "Format {partNumber}{part rev separator}{revision}. Part Number\
            \ and Revision formatted with separator. If a part number has a revision,\
            \ Plex will return the part number and the revision separated by the Part\
            \ Rev Separator setting. A Part Rev Separator can be up to 5 characters\
            \ long."
          example: string
          type: string
        partOperationId:
          description: UUID V4 format XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX. The UUID
            of the part operation that was being produced in the workcenter when the
            workcenter status transaction was recorded.
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        operationNumber:
          description: 10 characters max. The Operation Number (sequence order) of
            the part Operation that was being produced in the workcenter when the
            workcenter status transaction was recorded.
          example: 0
          format: int32
          type: integer
        operationCode:
          description: 30 characters max. The Operation Code associated to the partOperationID.
          example: string
          type: string
        duration:
          description: Duration that the workcenter was in the workcenter status given
            in seconds.
          example: 0
          format: int32
          type: integer
      title: production_operations_management_api_List_Workcenter_Status_Entries_item
      type: object
