          description: Purchase Order Ship To.
          example: string
          type: string
        firmDays:
          description: |-
            The maximum number of days in which to create releases with a firm status.
            Any value provided in this parameter will override any Approved Supplier record associated with the PO line item.
          example: 0
          format: int32
          type: integer
        planDays:
          description: |-
            The maximum number of days in which to create releases with a planned status.
            Any value provided in this parameter will override any Approved Supplier record associated with the PO line item.
          example: 0
          format: int32
          type: integer
        forecastDays:
          description: |-
            The maximum number of days in which to create releases with a forecast status.
            Provide a value in this parameter to limit the created releases (the Approved Supplier record is not used to limit the number of Forecast Days for releases).
          example: 0
          format: int32
          type: integer
        releaseLineNo:
          description: "The purchase order line item number that the release is associated\
            \ with. When this is included in the request, the value is taken from\
            \ the external system rather than assigned according to Plex logic when\
            \ releases are created. This value helps clarify the due date order in\
            \ the Plex user interface when releases are created out of order due to\
            \ parallel asynchronous batch processing."
          example: 0
          format: int32
          type: integer
